version: "2"

run:
  timeout: 5m
  modules-download-mode: readonly

linters:
  enable:
    - govet
    - staticcheck
    - ineffassign
    - misspell
  disable:
    - errcheck   # viper.BindPFlag / progress bar errors are non-critical
  settings:
    govet:
      enable-all: false
    staticcheck:
      checks:
        - "all"
        - "-SA1006"   # fmt.Sprintf with no format directives
        - "-SA1019"   # deprecated API usage
        - "-ST1000"   # package comments — not enforced in this project
        - "-ST1003"   # OWASP_A01_* naming is intentional (mirrors OWASP standard)
        - "-ST1020"   # exported comment format — cosmetic

formatters:
  enable:
    - gofmt

issues:
  max-issues-per-linter: 50
  max-same-issues: 5
