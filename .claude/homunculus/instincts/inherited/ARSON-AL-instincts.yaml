confidence: 0.90
domain: workflow
source: inherited
scope: project
---
## Action
Run workflows in concurrent loops:
- Perpetual: always enforce ops/ standards.
- Recon loop: int/ target modeling -> probes/ surface extraction -> model refinement.
- Scan loop: probes/ scan exposed surface -> discover new targets.
- Validation loop: proofs/ gate for exploitability -> ops/ check.
- Chain loop: braid low-severity findings into critical exploit chains -> report.

