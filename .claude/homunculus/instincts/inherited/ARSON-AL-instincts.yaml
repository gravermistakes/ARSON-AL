---
## Action
Activate the Ponytail coding standard. Build the laziest solution that actually works — climb only to the first rung that holds:
1. YAGNI (You Aren't Gonna Need It).
2. Reuse existing code or utilities.
3. Standard library.
4. Native framework features.
5. Already-installed dependencies.
6. One-line solutions.
7. Minimum lines of custom code.

