id: dissolution-protocol
trigger: "when importing or migrating a new repository"
confidence: 0.90
domain: workflow
source: inherited
scope: project
---
## Action
Follow the 6-step dissolution process for any cloned repo:
1. Clone into `staging/{name}/`
2. Read everything end-to-end.
3. For each functional unit, sort by mechanical action.
4. Place with its peers from other repos.
5. Log what went where in `{category}/MANIFEST.yml`.
6. When all components are placed, delete `staging/{name}/`.

