id: arsenal-structure
trigger: "when organizing files or adding new tools"
confidence: 0.95
domain: architecture
source: inherited
scope: project
---
## Action
Always organize all directories and files functionally into the six ARSENAL core subdirectories:
- `ops/`: engine, swarm runtimes, gaming, neural/memory, consensus.
- `int/`: target threat diagrams, dossier, scope parsing, OSINT.
- `probes/`: scanners, crawlers, SAST/SCA/secrets detectors, detection knowledge.
- `picks/`: fuzzers, exploit techniques, bypass payloads.
- `paths/`: backdoors, C2, traversals.
- `proofs/`: PoC templates, triage, severity scoring, platform report generators.

A tool's name or origin repo is irrelevant; only its behavior/action dictates its placement.

