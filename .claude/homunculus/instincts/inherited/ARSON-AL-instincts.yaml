id: claude-md-rule
trigger: "when entering or creating a new directory"
confidence: 0.85
domain: documentation
source: inherited
scope: project
---
## Action
If no `claude.md` exists in a subdirectory, create one under 50 lines containing:
- # {DIRECTORY}
- ## What's here — one paragraph
- ## Build — exact commands
- ## Test — verification
- ## Feeds — loops, what's consumed/emitted
- ## Issues — what's broken
Tag the file with `<!-- generated: {epoch} -->`.

