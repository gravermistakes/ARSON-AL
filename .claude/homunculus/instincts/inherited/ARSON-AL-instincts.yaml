# ARSON AL Workflow Bones Only Spec Draft Workflow

## Action

Follow the bones-only-spec-draft-workflow workflow:
1. Create a REVISE.md file in the target directory with a bones-only (skeleton) draft.
2. List key sections such as action sort, inventory, loop role, emits/consumes, open questions.
3. Leave blanks or placeholders for content to be filled in by a domain expert.
4. Once the draft is filled, promote it to SPEC.md.

## Evidence

- Workflow detected from commit patterns
- Frequency: ~2x per month
- Files: */REVISE.md, ops/*/REVISE.md

