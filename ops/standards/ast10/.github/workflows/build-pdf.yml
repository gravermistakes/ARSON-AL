name: Build Top 10 PDF

# Assembles the full OWASP Agentic Skills Top 10 into a single professional PDF
# (cover, executive summary, acknowledgements, table of contents, and all ten
# AST chapters rendered from their astNN.md source files).
# The PDF is uploaded as a build artifact on every run, and attached to a
# GitHub Release when one is published.

on:
  push:
    branches: [main]
    paths:
      - 'ast*.md'
      - 'tools/build_pdf.py'
      - 'assets/images/owasp-logo.png'
      - '.github/workflows/build-pdf.yml'
  workflow_dispatch:
  release:
    types: [published]

permissions:
  contents: write

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Install system libraries (WeasyPrint)
        run: |
          sudo apt-get update
          sudo apt-get install -y --no-install-recommends \
            libpango-1.0-0 libpangocairo-1.0-0 libgdk-pixbuf-2.0-0 \
            libffi-dev libcairo2 fonts-dejavu-core

      - name: Install Python dependencies
        run: python -m pip install --upgrade pip "weasyprint==69.0" "markdown>=3.6,<4"

      - name: Build PDF
        run: python tools/build_pdf.py --out dist/OWASP-Agentic-Skills-Top10.pdf

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: OWASP-Agentic-Skills-Top10-pdf
          path: dist/OWASP-Agentic-Skills-Top10.pdf
          if-no-files-found: error

      - name: Attach to release
        if: github.event_name == 'release'
        env:
          GH_TOKEN: ${{ github.token }}
        run: gh release upload "${{ github.event.release.tag_name }}" dist/OWASP-Agentic-Skills-Top10.pdf --clobber

      - name: Job summary
        run: |
          echo "### OWASP Agentic Skills Top 10 — PDF built :page_facing_up:" >> "$GITHUB_STEP_SUMMARY"
          echo "" >> "$GITHUB_STEP_SUMMARY"
          echo "Download **OWASP-Agentic-Skills-Top10-pdf** from the *Artifacts* section of this run." >> "$GITHUB_STEP_SUMMARY"
