name: Build Top 10 PPTX

# Generates the professional 12-slide OWASP Agentic Skills Top 10 deck
# (dist/OWASP-Agentic-Skills-Top10.pptx) from the astNN.md source files.
# The deck is uploaded as a build artifact on every run, and attached to a
# GitHub Release when one is published.

on:
  push:
    branches: [main]
    paths:
      - 'ast*.md'
      - 'tools/build_pptx.py'
      - 'assets/images/owasp-logo.png'
      - '.github/workflows/build-pptx.yml'
  workflow_dispatch:
  release:
    types: [published]

permissions:
  contents: write

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Install dependencies
        run: python -m pip install --upgrade pip "python-pptx==1.0.2" "Pillow>=10,<14"

      - name: Build deck
        run: python tools/build_pptx.py --out dist/OWASP-Agentic-Skills-Top10.pptx

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: OWASP-Agentic-Skills-Top10-pptx
          path: dist/OWASP-Agentic-Skills-Top10.pptx
          if-no-files-found: error

      - name: Attach to release
        if: github.event_name == 'release'
        env:
          GH_TOKEN: ${{ github.token }}
        run: gh release upload "${{ github.event.release.tag_name }}" dist/OWASP-Agentic-Skills-Top10.pptx --clobber

      - name: Job summary
        run: |
          echo "### OWASP Agentic Skills Top 10 — slide deck built :bar_chart:" >> "$GITHUB_STEP_SUMMARY"
          echo "" >> "$GITHUB_STEP_SUMMARY"
          echo "Download **OWASP-Agentic-Skills-Top10-pptx** from the *Artifacts* section of this run." >> "$GITHUB_STEP_SUMMARY"
