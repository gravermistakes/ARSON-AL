name: Docs Integrity

on:
  pull_request:
  push:
    branches:
      - main
      - akram-stss

permissions:
  contents: read

jobs:
  validate-docs:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Run repository validation script
        run: bash ./validate.sh
